services:
  bot:
    build:
      context: .
      target: bot
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PYTHON_BIN: python3
      DASHBOARD_ENABLED: "false"
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:${TELEGRAM_WEBHOOK_PORT:-8443}:8443"

  dashboard-api:
    build:
      context: .
      target: api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PYTHON_BIN: python3
      DASHBOARD_API_HOST: 0.0.0.0
      DASHBOARD_API_PORT: 8010
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    expose:
      - "8010"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dashboard-web:
    build:
      context: .
      target: dashboard-web
    depends_on:
      dashboard-api:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${DASHBOARD_WEB_PORT:-5173}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
